<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedIMS Login</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>MedIMS</h1>
      <p>Medical Inventory Management System</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required />
        </div>

        <div class="form-group">
          <label>Department ID</label>
          <input type="text" id="departmentId" placeholder="Enter department ID" required />
        </div>

        <div class="form-group">
          <label>Role</label>
          <select id="role" required>
            <option value="User">User</option>
            <option value="Admin">Admin</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit">Login</button>
          <button type="button" class="secondary" onclick="alert('Frontend demo only.')">Create Account</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
