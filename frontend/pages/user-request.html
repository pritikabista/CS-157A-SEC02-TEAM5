<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Request</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="page main">
    <div class="topbar">
      <div>
        <h2>Submit Request</h2>
        <p>Request purchase or reorder for a selected item.</p>
      </div>
      <a href="user-inventory.html"><button class="secondary">Back to Inventory</button></a>
    </div>

    <div class="form-card">
      <form id="requestForm">
        <div class="form-group">
          <label>Item</label>
          <input type="text" id="requestItem" readonly />
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea id="requestMessage" placeholder="Write your request here..." required></textarea>
        </div>

        <div class="form-actions">
          <button type="submit">Submit Request</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
