<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedIMS Update Inventory</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>MedIMS Admin</h2>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="admin-inventory.html">Inventory</a>
      <a href="purchase-requests.html">Purchase Requests</a>
      <a href="orders.html">Orders</a>
      <a href="supplier-info.html">Supplier Info</a>
      <a href="login.html">Logout</a>
    </aside>

    <main class="main">
      <div class="topbar">
        <h2>Update Inventory Item</h2>
      </div>

      <div class="card" style="max-width: 850px; margin-top: 20px;">
        <form id="updateInventoryForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="itemName">Item Name</label>
              <input
                type="text"
                id="itemName"
                name="itemName"
                value="Surgical Gloves"
                required
              />
            </div>

            <div class="form-group">
              <label for="referenceNumber">Reference Number</label>
              <input
                type="text"
                id="referenceNumber"
                name="referenceNumber"
                value="MED-1001"
                required
              />
            </div>

            <div class="form-group">
              <label for="lotId">Lot ID</label>
              <input
                type="text"
                id="lotId"
                name="lotId"
                value="LOT-A123"
                required
              />
            </div>

            <div class="form-group">
              <label for="expirationDate">Expiration Date</label>
              <input
                type="date"
                id="expirationDate"
                name="expirationDate"
                value="2026-05-10"
                required
              />
            </div>

            <div class="form-group">
              <label for="quantity">Quantity</label>
              <input
                type="number"
                id="quantity"
                name="quantity"
                value="8"
                min="0"
                required
              />
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" name="category" required>
                <option value="PPE" selected>PPE</option>
                <option value="Injection Supplies">Injection Supplies</option>
                <option value="Fluids">Fluids</option>
                <option value="Medication">Medication</option>
                <option value="Sterile Supplies">Sterile Supplies</option>
              </select>
            </div>

            <div class="form-group full">
              <label for="location">Location</label>
              <input
                type="text"
                id="location"
                name="location"
                value="Storage Room A"
                required
              />
            </div>

            <div class="form-group full">
              <label for="notes">Notes</label>
              <textarea
                id="notes"
                name="notes"
                placeholder="Add update notes here..."
              >Adjusting quantity after stock review.</textarea>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="primary-btn">Save</button>
            <button
              type="button"
              class="gray-btn"
              onclick="window.location.href='admin-inventory.html'"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    document.getElementById("updateInventoryForm").addEventListener("submit", function(event) {
      event.preventDefault();
      alert("Inventory item updated successfully!");
      window.location.href = "admin-inventory.html";
    });
  </script>
</body>
</html>
